<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams Web Backup</title>
  <link rel="icon" href="../../build/icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="panel">
    <div class="brand">
      <img class="mark" src="../../build/icon.png" alt="">
      <div>
        <h1>Teams Web Backup</h1>
        <p id="statusText">Sign in to Teams, open Chats, then start an export.</p>
      </div>
    </div>

    <div class="actions">
      <details class="menu">
        <summary>Teams</summary>
        <div class="menuPanel">
          <button id="teamsBtn" data-busy-disabled="true">Reload Teams</button>
          <button id="resetTeamsBtn" data-busy-disabled="true">Reset Session</button>
        </div>
      </details>

      <details class="menu">
        <summary>Folder</summary>
        <div class="menuPanel">
          <button id="folderBtn" data-busy-disabled="true">Choose Folder</button>
          <button id="openBtn">Open Export</button>
        </div>
      </details>

      <label class="concurrencyControl" title="Concurrent download threads">
        <span>Concurrent Download Threads</span>
        <input id="concurrencyInput" type="number" min="1" max="10" step="1" value="5">
      </label>

      <details class="menu">
        <summary class="primary">Export Chat</summary>
        <div class="menuPanel">
          <button id="currentBtn" data-busy-disabled="true">Current Chat</button>
          <button id="allBtn" data-busy-disabled="true">All Chats</button>
        </div>
      </details>

      <details class="menu">
        <summary class="primary">Export Files</summary>
        <div class="menuPanel">
          <button id="sharedCurrentBtn" data-busy-disabled="true">Current Chat</button>
          <button id="sharedAllBtn" data-busy-disabled="true">All Chats</button>
        </div>
      </details>

      <button id="resumeBtn" data-busy-disabled="true" title="Resume from an existing export folder">Resume</button>
      <button id="stopBtn" class="danger" disabled>Stop</button>

      <details class="menu">
        <summary>Dev Tools</summary>
        <div class="menuPanel menuPanelRight">
          <button id="panelDevtoolsBtn">App</button>
          <button id="teamsDevtoolsBtn">Browser</button>
        </div>
      </details>
    </div>

    <div class="stats">
      <span><b id="chatCount">0</b> chats</span>
      <span><b id="messageCount">0</b> messages</span>
      <span><b id="queuedCount">0</b> queued</span>
      <span><b id="downloadedCount">0</b> files</span>
      <span><b id="failedCount">0</b> failed</span>
      <button id="queueToggleBtn" class="queueToggle" aria-expanded="false">Queue Items</button>
    </div>
  </header>

  <script src="./app.js"></script>
</body>
</html>
