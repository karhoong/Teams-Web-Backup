<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams Web Backup</title>
  <link rel="icon" href="../../build/icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="panel">
    <div class="brand">
      <img class="mark" src="../../build/icon.png" alt="">
      <div>
        <div class="titleRow">
          <h1 data-i18n="appName">Teams Web Backup</h1>
          <span id="versionLabel" class="versionLabel"></span>
        </div>
        <p id="statusText" data-i18n="initialStatus">Sign in to Teams, open Chats, then start an export.</p>
      </div>
    </div>

    <div class="actions">
      <details class="menu">
        <summary data-i18n="teams">Teams</summary>
        <div class="menuPanel">
          <button id="teamsBtn" data-busy-disabled="true" data-i18n="reloadTeams">Reload Teams</button>
          <button id="resetTeamsBtn" data-busy-disabled="true" data-i18n="resetSession">Reset Session</button>
        </div>
      </details>

      <details class="menu">
        <summary data-i18n="folder">Folder</summary>
        <div class="menuPanel">
          <button id="folderBtn" data-busy-disabled="true" data-i18n="chooseFolder">Choose Folder</button>
          <button id="openBtn" data-i18n="openExport">Open Export</button>
        </div>
      </details>

      <label class="concurrencyControl" data-i18n-title="concurrentThreads" title="Concurrent download threads">
        <span data-i18n="concurrentThreads">Concurrent Download Threads</span>
        <input id="concurrencyInput" type="number" min="1" max="10" step="1" value="5">
      </label>

      <details class="menu">
        <summary class="primary" data-i18n="exportChat">Export Chat</summary>
        <div class="menuPanel">
          <button id="currentBtn" data-busy-disabled="true" data-i18n="currentChat">Current Chat</button>
          <button id="allBtn" data-busy-disabled="true" data-i18n="allChats">All Chats</button>
        </div>
      </details>

      <details class="menu">
        <summary class="primary" data-i18n="exportFiles">Export Files</summary>
        <div class="menuPanel">
          <button id="sharedCurrentBtn" data-busy-disabled="true" data-i18n="currentChat">Current Chat</button>
          <button id="sharedAllBtn" data-busy-disabled="true" data-i18n="allChats">All Chats</button>
        </div>
      </details>

      <button id="resumeBtn" data-busy-disabled="true" data-i18n="resume" data-i18n-title="resumeTitle" title="Resume from an existing export folder">Resume</button>
      <button id="stopBtn" class="danger" disabled data-i18n="stop">Stop</button>

      <details class="menu">
        <summary data-i18n="devTools">Dev Tools</summary>
        <div class="menuPanel menuPanelRight">
          <button id="panelDevtoolsBtn" data-i18n="app">App</button>
          <button id="teamsDevtoolsBtn" data-i18n="browser">Browser</button>
        </div>
      </details>
      <button id="settingsBtn" class="iconButton" data-i18n-title="settings" data-i18n-aria-label="settings" title="Settings" aria-label="Settings">
        <span aria-hidden="true">&#9881;</span>
      </button>
    </div>

    <div class="stats">
      <span><b id="chatCount">0</b> <span data-i18n="chats">chats</span></span>
      <span><b id="messageCount">0</b> <span data-i18n="messages">messages</span></span>
      <span><b id="queuedCount">0</b> <span data-i18n="queued">queued</span></span>
      <span><b id="downloadedCount">0</b> <span data-i18n="files">files</span></span>
      <span><b id="failedCount">0</b> <span data-i18n="failed">failed</span></span>
      <button id="queueToggleBtn" class="queueToggle" aria-expanded="false" data-i18n="queueItems">Queue Items</button>
    </div>
  </header>

  <script src="./i18n.js"></script>
  <script src="./app.js"></script>
</body>
</html>
