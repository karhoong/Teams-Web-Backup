<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostics</title>
  <link rel="icon" href="../../build/icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="diagnosticsWindow">
  <section class="diagnosticsPanel">
    <div class="diagnosticsHeader">
      <div>
        <div class="titleRow">
          <h1 data-i18n="diagnostics">Diagnostics</h1>
          <span id="versionLabel" class="versionLabel"></span>
        </div>
        <p id="diagnosticsSummary" data-i18n="loadingDiagnostics">Loading diagnostics...</p>
      </div>
      <div class="diagnosticsActions">
        <button id="refreshDiagnosticsBtn" data-i18n="refresh">Refresh</button>
        <button id="copyDiagnosticsBtn" data-i18n="copy">Copy</button>
        <button id="clearDiagnosticsBtn" data-i18n="clearView">Clear View</button>
        <button id="closeDiagnosticsBtn" data-i18n="close">Close</button>
      </div>
    </div>
    <div id="diagnosticsState" class="diagnosticsState"></div>
    <div id="diagnosticsList" class="diagnosticsList" aria-live="polite"></div>
  </section>

  <script src="./i18n.js"></script>
  <script src="./diagnostics.js"></script>
</body>
</html>
